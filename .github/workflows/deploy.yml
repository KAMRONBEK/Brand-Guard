# Deploys the built SPA to the tdev server over SSH.
#
# Required repository secrets:
#   SSH_HOST        - hostname or IP of tdev (e.g. tdev.example.com)
#   SSH_USER        - SSH username on tdev
#   SSH_PRIVATE_KEY - private key (PEM) authorized on tdev for SSH_USER
#   SSH_PORT        - (optional) SSH port; defaults to 22
#   DEPLOY_PATH     - absolute path on tdev to sync dist/ into
#                     (e.g. /var/www/brand-guard)

name: Deploy to tdev

on:
  push:
    branches: [prod]

concurrency:
  group: deploy-tdev
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy dist/ to tdev via rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
